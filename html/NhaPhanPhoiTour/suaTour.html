<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa tour</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/NPP.css">
</head>

<body>

    <div class="container-fluid">
        <div class="row">

            <!-- SIDEBAR -->
            <div class="col-md-3 col-lg-2 sidebar">
                <h4 class="text-white text-center mt-3">TAVIVU PROVIDER</h4>

                <a href="#" class="row-odd active">Tour đã tạo</a>
                <a href="#" class="row-even">Tạo tour</a>
                <a href="#" class="row-odd">Đơn đặt tour</a>
                <a href="#" class="row-even">Phản hồi từ Admin</a>
                <a href="#" class="row-odd">Thống kê doanh thu</a>
                <a href="#" class="row-even">Đăng xuất</a>
            </div>

            <!-- CONTENT -->
            <div class="col-md-9 col-lg-10 p-4">

                <h3 class="mb-4 text-title">Chỉnh sửa tour</h3>

                <hr>

                <div class="content-box">

                    <form>

                        <div class="row">
                            <!-- TÊN TOUR -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label"> <strong>Tên tour</strong> </label>
                                <input type="text" class="form-control" value="Tour Đà Nẵng">
                            </div>

                            <!-- GIÁ -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label"> <strong>Giá (VNĐ)</strong> </label>
                                <input type="number" class="form-control" value="3500000">
                            </div>

                            <!-- NGÀY KHỞI HÀNH -->
                            <div class="col-md-3 mb-3">
                                <label class="form-label"> <strong>Ngày khởi hành</strong> </label>
                                <input type="date" class="form-control" value="2026-04-10">
                            </div>

                            <!-- SỐ NGÀY -->
                            <div class="col-md-2 mb-3">
                                <label class="form-label"> <strong>Số ngày</strong> </label>
                                <input type="number" class="form-control" placeholder="Ví dụ: 3" value="3">
                            </div>

                            <!-- SỐ ĐÊM -->
                            <div class="col-md-2 mb-3">
                                <label class="form-label"> <strong>Số đêm</strong> </label>
                                <input type="number" class="form-control" placeholder="Ví dụ: 2" value="2">
                            </div>

                            <!-- SỐ LƯỢNG -->
                            <div class="col-md-2 mb-3">
                                <label class="form-label"> <strong>Số chỗ</strong> </label>
                                <input type="number" class="form-control" value="20">
                            </div>

                            <!-- ĐIỂM ĐẾN -->
                            <div class="col-md-3 mb-3">
                                <label class="form-label"> <strong>Điểm đến</strong> </label>
                                <select class="form-select">
                                    <option>Chọn điểm đến</option>
                                    <option selected>Đà Nẵng</option>
                                    <option>Phú Quốc</option>
                                    <option>Hà Nội</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Hình ảnh</label>
                                <input type="file" class="form-control">
                            </div>

                            <div class="col-md-12 mb-3">
                                <label class="form-label">Mô tả</label>
                                <textarea class="form-control" rows="4"> Tour tham quan Đà Nẵng...</textarea>
                            </div>

                        </div>

                        <div class="d-flex justify-content-between action-group">
                            <a href="my_tours.html" class="btn btn-secondary">
                                ← Hủy
                            </a>

                            <button class="btn btn-success">
                                Lưu thay đổi
                            </button>
                        </div>

                    </form>

                </div>

            </div>

        </div>
    </div>

</body>

</html>
