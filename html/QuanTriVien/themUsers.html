<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Thêm người dùng</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/QTV.css">
</head>

<body>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 sidebar">
                <h4 class="text-white text-center mt-3">TAVIVU ADMIN</h4>
                <a href="#" class="row-odd">Quản lý người dùng</a>
                <a href="#" class="row-even">Duyệt tour</a>
                <a href="#" class="row-odd">Danh sách tour</a>
                <a href="#" class="row-even">Đơn đặt tour</a>
                <a href="#" class="row-odd">Quản lý điểm đến</a>
                <a href="#" class="row-even">Danh sách báo cáo vi phạm</a>
                <a href="#" class="row-odd">Danh sách tour vi phạm</a>
                <a href="#" class="row-even">Thống kê doanh thu</a>
                <a href="#" class="row-odd">Đăng xuất</a>
            </div>

            <!-- MAIN CONTENT -->
            <div class="col-md-9 col-lg-10 p-4">

                <h3 class="mb-4 text-title">Thêm người dùng</h3>

                <div class="content-box">

                    <form>

                        <!-- Họ tên -->
                        <div class="mb-3">
                            <label class="form-label"><strong>Họ tên</strong></label>
                            <input type="text" class="form-control" placeholder="Nhập họ tên">
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label"><strong>Email</strong></label>
                            <input type="email" class="form-control" placeholder="Nhập email">
                        </div>

                        <!-- Mật khẩu -->
                        <div class="mb-3">
                            <label class="form-label"><strong>Mật khẩu</strong></label>
                            <input type="password" class="form-control" placeholder="Nhập mật khẩu">
                        </div>

                        <!-- Vai trò -->
                        <div class="mb-3">
                            <label class="form-label"><strong>Vai trò</strong></label>
                            <select class="form-select">
                                <option>Khách hàng</option>
                                <option>Admin</option>
                                <option>Nhà phân phối</option>
                            </select>
                        </div>

                        <!-- BUTTON -->
                        <div class="d-flex justify-content-between">
                            <a href="quanLyUsers.html" class="btn btn-secondary">← Quay lại</a>
                            <button type="submit" class="btn btn-primary">Lưu người dùng</button>
                        </div>

                    </form>

                </div>

            </div>

        </div>
    </div>

</body>

</html>
